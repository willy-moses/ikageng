
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #09100f; font-family: 'DM Mono', monospace; }

  .wrap {
    min-height: 520px;
    background: #09100f;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .card {
    background: #111a18;
    border: 1px solid #1e2d28;
    border-radius: 16px;
    padding: 2.2rem 2rem 2rem;
    width: min(400px, 100%);
  }

  .logo-row {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: .6rem;
    margin-bottom: 1.8rem;
  }
  .logo-circle {
    width: 58px; height: 58px; border-radius: 50%;
    background: linear-gradient(135deg, #2c5530 0%, #34623a 60%, #3d6f44 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem; font-weight: 700; color: #fff;
    border: 2px solid rgba(0,201,138,.25);
  }
  .logo-title {
    font-size: 1.3rem; font-weight: 700; color: #dff0eb;
    letter-spacing: .02em;
  }
  .logo-sub { font-size: .65rem; color: #6b8c84; letter-spacing: .1em; text-transform: uppercase; }

  .divider {
    height: 1px; background: #1e2d28; margin-bottom: 1.5rem;
  }

  .form-label {
    font-size: .58rem; letter-spacing: .18em; text-transform: uppercase;
    color: #6b8c84; display: block; margin-bottom: .35rem;
  }
  .form-group { margin-bottom: 1rem; }

  .form-input {
    width: 100%; background: #18241f; border: 1px solid #1e2d28;
    color: #dff0eb; font-family: 'DM Mono', monospace; font-size: .82rem;
    padding: .65rem 1rem; border-radius: 8px; outline: none;
    transition: border-color .2s;
  }
  .form-input:focus { border-color: #00c98a; }
  .form-input::placeholder { color: #6b8c84; }

  .input-wrap { position: relative; }
  .eye-btn {
    position: absolute; right: .75rem; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; color: #6b8c84;
    font-size: .78rem; padding: 0; line-height: 1;
    transition: color .15s;
  }
  .eye-btn:hover { color: #00c98a; }

  .error-msg {
    font-size: .65rem; color: #f06060; margin-top: .3rem;
    display: none;
  }
  .error-msg.show { display: block; }

  .login-btn {
    width: 100%; padding: .78rem;
    background: linear-gradient(135deg, #2c5530 0%, #34623a 100%);
    border: 1px solid rgba(0,201,138,.35); border-radius: 8px;
    color: #fff; font-family: 'DM Mono', monospace; font-size: .82rem;
    font-weight: 500; letter-spacing: .08em; text-transform: uppercase;
    cursor: pointer; transition: opacity .2s, transform .1s;
    margin-top: .4rem; display: flex; align-items: center; justify-content: center; gap: .6rem;
  }
  .login-btn:hover { opacity: .88; }
  .login-btn:active { transform: scale(.98); }
  .login-btn:disabled { opacity: .4; cursor: not-allowed; }

  .spinner-sm {
    width: 14px; height: 14px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,.3); border-top-color: #fff;
    animation: spin .6s linear infinite; display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .footer-note {
    text-align: center; margin-top: 1.4rem;
    font-size: .62rem; color: #6b8c84; line-height: 1.7;
  }
  .footer-note strong { color: #00c98a; }

  .success-overlay {
    display: none; flex-direction: column; align-items: center;
    justify-content: center; gap: 1rem; padding: 1.5rem 0;
    text-align: center;
  }
  .success-overlay.show { display: flex; }
  .check-circle {
    width: 56px; height: 56px; border-radius: 50%;
    background: rgba(0,201,138,.12); border: 2px solid rgba(0,201,138,.4);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem;
  }
  .success-msg { font-size: .85rem; color: #00c98a; font-weight: 500; }
  .success-sub { font-size: .68rem; color: #6b8c84; }

  .demo-hint {
    background: rgba(232,184,75,.06); border: 1px solid rgba(232,184,75,.2);
    border-radius: 8px; padding: .7rem 1rem; margin-bottom: 1.1rem;
    font-size: .65rem; color: #e8b84b; line-height: 1.7;
  }
  .demo-hint span { opacity: .7; }
</style>

<div class="wrap">
  <div class="card">
    <div class="logo-row">
      <div class="logo-circle">IK</div>
      <div class="logo-title">Ikageng VDC</div>
      <div class="logo-sub">Officer Login Portal</div>
    </div>
    <div class="divider"></div>

    <div id="loginForm">
      <div class="demo-hint">
        <span>Demo credentials —</span> officer@ikageng.bw / <strong>vdc2025</strong>
      </div>

      <div class="form-group">
        <label class="form-label">Email address</label>
        <input class="form-input" id="emailInput" type="email" placeholder="officer@ikageng.bw" autocomplete="email">
        <div class="error-msg" id="emailErr">Please enter a valid email address.</div>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrap">
          <input class="form-input" id="passInput" type="password" placeholder="••••••••" autocomplete="current-password" style="padding-right:2.5rem">
          <button class="eye-btn" onclick="togglePass()" id="eyeBtn" title="Show/hide password">👁</button>
        </div>
        <div class="error-msg" id="passErr">Incorrect email or password.</div>
      </div>

      <button class="login-btn" id="loginBtn" onclick="doLogin()">
        <div class="spinner-sm" id="btnSpinner"></div>
        <span id="btnText">Sign In</span>
      </button>
    </div>

    <div class="success-overlay" id="successOverlay">
      <div class="check-circle">✓</div>
      <div class="success-msg">Login successful</div>
      <div class="success-sub">Redirecting to project management…</div>
    </div>

    <div class="footer-note">
      Ipelegeng Programme Management<br>
      <strong>Ikageng VDC</strong> · Botswana
    </div>
  </div>
</div>

<script>
const VALID_EMAIL = 'officer@ikageng.bw';
const VALID_PASS  = 'vdc2025';

function togglePass() {
  const inp = document.getElementById('passInput');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

function doLogin() {
  const email = document.getElementById('emailInput').value.trim();
  const pass  = document.getElementById('passInput').value;
  const emailErr = document.getElementById('emailErr');
  const passErr  = document.getElementById('passErr');

  emailErr.classList.remove('show');
  passErr.classList.remove('show');

  let ok = true;
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    emailErr.classList.add('show'); ok = false;
  }
  if (!pass) {
    passErr.textContent = 'Please enter your password.';
    passErr.classList.add('show'); ok = false;
  }
  if (!ok) return;

  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  document.getElementById('btnSpinner').style.display = 'block';
  document.getElementById('btnText').textContent = 'Signing in…';

  setTimeout(() => {
    if (email === VALID_EMAIL && pass === VALID_PASS) {
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('successOverlay').classList.add('show');
      setTimeout(() => {
        sendPrompt('Login successful — now show me the project management screen so I can choose a project');
      }, 1800);
    } else {
      btn.disabled = false;
      document.getElementById('btnSpinner').style.display = 'none';
      document.getElementById('btnText').textContent = 'Sign In';
      passErr.textContent = 'Incorrect email or password.';
      passErr.classList.add('show');
    }
  }, 1200);
}

document.getElementById('passInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('emailInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('passInput').focus();
});
</script>
