// ── Audit Log ─────────────────────────────────────────────────────────────
async function logAudit(action, omang, name, details = {}) {
  await sb.from('worker_audit_log').insert({
    action,
    worker_omang: omang,
    worker_name:  name,
    performed_by: 'User',
    details,
    project_id:   PROJECT_ID || null,
  });
}

// ── Init ───────────────────────────────────────────────────────────────────
async function init() {
  document.getElementById('backBtn').href =
    PROJECT_ID ? `vdc-dashboard.html?project=${PROJECT_ID}` : 'vdc-dashboard.html';
  document.getElementById('ioBtn').href =
    PROJECT_ID ? `waiting-list-io.html?project=${PROJECT_ID}` : 'waiting-list-io.html';
  document.getElementById('sitesBtn').href =
    PROJECT_ID ? `site-allocation.html?project=${PROJECT_ID}` : 'site-allocation.html';
  document.getElementById('transferBtn').href =

  if (PROJECT_ID) await loadProjectContext();
  await loadList();

async function loadProjectContext() {
  const { data, error } = await sb
    .from('projects')
    .select('project_name, month, year')
    .eq('id', PROJECT_ID)
    .single();

  if (error || !data) return;

  _projectName = data.project_name;
  const period = [data.month, data.year].filter(Boolean).join(' ');

  document.getElementById('projectStrip').style.display = 'flex';
  document.getElementById('psName').textContent   = data.project_name;
  document.getElementById('psPeriod').textContent = period ? `· ${period}` : '';
  document.getElementById('psGlobalBadge').textContent           = 'Project List';
  document.getElementById('psGlobalBadge').style.background         = 'rgba(0,201,138,.08)';
  document.getElementById('psGlobalBadge').style.borderColor        = 'rgba(0,201,138,.2)';
  document.getElementById('psGlobalBadge').style.color               = 'var(--accent)';
  document.getElementById('headerSub').textContent =
    `${data.project_name}${period ? ' — ' + period : ''} · Priority Queue`;
  document.querySelector('.gn-icon').textContent = '📌';
  document.getElementById('noticeText').innerHTML =
    `Showing workers registered under <strong>${data.project_name}</strong> only. Workers added here will be linked to this project.`;
  document.getElementById('globalNotice').style.background  = 'rgba(0,201,138,.05)';
  document.getElementById('globalNotice').style.borderColor = 'rgba(0,201,138,.18)';
  document.getElementById('globalNotice').style.color       = 'var(--accent)';
}

// ── Helpers ────────────────────────────────────────────────────────────────
function fmtOmang(v){ const d=v.replace(/\D/g,'').substring(0,9);let o='';for(let i=0;i<d.length;i++){if(i&&i%3===0)o+=' ';o+=d[i];}return o; }
function rawOmang(v){ return (v||'').replace(/\s/g,''); }
function validOmang(v){ const r=rawOmang(v);return r.length===9&&/^\d{9}$/.test(r); }
function genderFromOmang(v){ const r=rawOmang(v);if(r.length===9){const d=parseInt(r[4]);if(d===1)return'M';if(d===2)return'F';}return null; }
function calcAge(dob){ if(!dob)return'?';const b=new Date(dob),t=new Date();let a=t.getFullYear()-b.getFullYear();if(t.getMonth()<b.getMonth()||(t.getMonth()===b.getMonth()&&t.getDate()<b.getDate()))a--;return isNaN(a)?'?':a; }
function calcScore(w){
  let s=100;
  if(!w.last_worked_date){s+=50;}
  else{const days=Math.floor((Date.now()-new Date(w.last_worked_date))/86400000);if(days>365)s+=40;else if(days>180)s+=30;else if(days>90)s+=20;else if(days>30)s+=10;}
  s-=Math.min((w.total_employments||0)*5,30);
  s-=Math.min(Math.floor((w.total_days_worked||0)/10),20);
  return Math.max(s,0);
}
function priInfo(score){
  if(score>=120)return{key:'veryhigh',label:'Very High',card:'p-veryhigh',badge:'pb-veryhigh'};
  if(score>=100)return{key:'high',label:'High',card:'p-high',badge:'pb-high'};
  if(score>=80) return{key:'medium',label:'Medium',card:'p-medium',badge:'pb-medium'};
  return{key:'low',label:'Low',card:'p-low',badge:'pb-low'};
}

// ── Load ───────────────────────────────────────────────────────────────────
async function loadList(){
  let query = sb.from('waiting_list').select('*').order('registered_date', { ascending: true });
  if (PROJECT_ID) query = query.eq('project_id', PROJECT_ID);
  const { data, error } = await query;
  if (error) { showToast('Failed to load: ' + error.message, 'error'); return; }
  _list = data || [];
  renderList();
}

// ── Filter + Render ────────────────────────────────────────────────────────
function setFilter(el){
  document.querySelectorAll('.filter-chips .chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active'); _filter = el.dataset.f; renderList();
}

function renderList(){
  const q = (document.getElementById('searchInput').value || '').toLowerCase();

  // Full sorted list — used for real queue ranks
  const fullSorted = _list
    .map(w => ({ ...w, _s: calcScore(w), _p: priInfo(calcScore(w)) }))
    .sort((a,b) => b._s - a._s || new Date(a.registered_date) - new Date(b.registered_date));
  const rankMap = {};
  fullSorted.forEach((w, i) => { rankMap[w.id] = i + 1; });

  // Filtered view
  const list = fullSorted.filter(w => {
    const txt = `${w.first_name} ${w.surname} ${w.omang_number} ${w.village||''}`.toLowerCase();
    if (q && !txt.includes(q)) return false;
    if (_filter === 'all') return true;
    if (_filter === 'returning') return !!w.is_returning_worker;
    return w._p.key === _filter;
  });

  document.getElementById('stat-total').textContent    = fullSorted.length;
  document.getElementById('stat-veryhigh').textContent = fullSorted.filter(w => w._s >= 120).length;
  document.getElementById('stat-high').textContent     = fullSorted.filter(w => w._s >= 100 && w._s < 120).length;
  document.getElementById('listLabel').textContent     = `${list.length} worker${list.length !== 1 ? 's' : ''} shown`;

  const el = document.getElementById('workerList');
  if (!list.length) {
    el.innerHTML = `<div class="empty-state">${(q || _filter !== 'all') ? 'No workers match your search.' : 'No workers on the waiting list yet.'}</div>`;
    return;
  }

  el.innerHTML = list.map((w) => {
    const mmp     = w.mobile_money_provider === 'smega' ? 'Smega' : 'Orange Money';
    const regDate = w.registered_date ? new Date(w.registered_date).toLocaleDateString('en-ZA') : '—';
    const lastW   = w.last_worked_date ? new Date(w.last_worked_date).toLocaleDateString('en-ZA') : 'Never';
    const rank    = rankMap[w.id];
    return `<div class="worker-card ${w._p.card}">
      <div class="card-top">
        <span class="rank-badge">#${rank} of ${fullSorted.length}</span>
        <span class="priority-badge ${w._p.badge}">${w._p.label}</span>
        ${w.is_returning_worker ? '<span class="returning-badge">↩ Returning</span>' : ''}
      </div>
      <div class="worker-name">${w.first_name} ${w.surname}</div>
      <div class="worker-detail">📍 <b>${w.village||'—'}</b></div>
      <div class="worker-detail">🆔 <b>${fmtOmang(w.omang_number)}</b> &nbsp;·&nbsp; ${w.sex==='M'?'♂ Male':'♀ Female'} &nbsp;·&nbsp; Age: <b>${calcAge(w.date_of_birth)}</b></div>
      <div class="worker-detail">📱 <b>${w.cellphone_number||'No phone'}</b> &nbsp;·&nbsp; 🎓 <b>${w.qualification}</b></div>
      <div class="worker-detail">💰 <b>${mmp}</b></div>
      <div class="worker-detail">📅 Last worked: <b>${lastW}</b></div>
      <div class="worker-detail">📊 Employments: <b>${w.total_employments||0}</b> &nbsp;·&nbsp; Days worked: <b>${w.total_days_worked||0}</b></div>
      <div class="worker-detail">⏰ Registered: <b>${regDate}</b> &nbsp;·&nbsp; Score: <b>${w._s}</b></div>
      ${w.notes ? '<div class="worker-notes">📝 ' + w.notes + '</div>' : ''}
      <div class="card-footer">
        <button class="edit-pill" onclick="openEdit('${w.id}')">Edit</button>
        <button class="remove-pill" onclick="removeWorker('${w.id}','${w.first_name} ${w.surname}')">Remove from List</button>
      </div>
    </div>`;
  }).join('');
}

// ── Remove ─────────────────────────────────────────────────────────────────
async function removeWorker(id, name){
  if (!confirm(`Remove ${name} from the waiting list?`)) return;
  const removed = _list.find(x => x.id === id);
  const { error } = await sb.from('waiting_list').delete().eq('id', id);
  if (error) { showToast('Error: ' + error.message, 'error'); return; }
  await logAudit('removed', removed?.omang_number || '—', name, {});
  showToast(`${name} removed from waiting list`);
  await loadList();
}

// ── Modal — Add ────────────────────────────────────────────────────────────
function openModal(){
  _editId = null;
  resetForm();
  document.getElementById('omangInputGroup').style.display  = '';
  document.getElementById('omangLockedGroup').style.display = 'none';
  document.getElementById('modalTitle').textContent  = 'Add Worker to Waiting List';
  document.getElementById('saveBtn').textContent     = 'Add to List';

    document.getElementById('modalProjectBanner').style.display = 'flex';
    document.getElementById('modalProjectName').textContent = _projectName;
  }
  document.getElementById('addModal').classList.add('open');

// ── Modal — Edit ───────────────────────────────────────────────────────────
function openEdit(id){
  const w = _list.find(x => x.id === id);
  if (!w) return;
  _editId = id;
  resetForm();
  document.getElementById('omangInputGroup').style.display  = 'none';
  document.getElementById('omangLockedGroup').style.display = '';
  document.getElementById('omangLockedDisplay').textContent = fmtOmang(w.omang_number);
  document.getElementById('f-surname').value = w.surname           || '';
  document.getElementById('f-first').value   = w.first_name        || '';
  document.getElementById('f-dob').value     = w.date_of_birth     || '';
  document.getElementById('f-village').value = w.village           || '';
  document.getElementById('f-phone').value   = w.cellphone_number  || '';
  document.getElementById('f-notes').value   = w.notes             || '';
  if (w.sex)                   setChipVal('sex',  w.sex);
  if (w.mobile_money_provider) setChipVal('mmp',  w.mobile_money_provider);
  if (w.qualification)         setChipVal('qual', w.qualification);
  document.getElementById('modalTitle').textContent = 'Edit Worker';
  document.getElementById('saveBtn').textContent    = 'Save Changes';
  document.getElementById('addModal').classList.add('open');
}

function closeModal(){
  document.getElementById('addModal').classList.remove('open');
  _afCache = null; _editId = null;
}

function resetForm(){
  ['f-surname','f-first','f-dob','f-village','f-phone','f-notes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-omang').value = '';
  setChipVal('sex','M'); setChipVal('mmp','smega'); setChipVal('qual','PSLE');
  document.getElementById('omangHint').textContent = 'Enter 9-digit Omang number';
  document.getElementById('omangHint').className   = 'omang-hint';
  document.getElementById('formErr').textContent   = '';
  document.getElementById('autofillBox').style.display        = 'none';
  document.getElementById('modalProjectBanner').style.display = 'none';
  _afCache = null;
}

// ── Chip helpers ────────────────────────────────────────────────────────────
function setChip(g, el){ document.querySelectorAll(`#chips-${g} .fchip`).forEach(c => c.classList.remove('active')); el.classList.add('active'); }
function setChipVal(g, v){ document.querySelectorAll(`#chips-${g} .fchip`).forEach(c => c.classList.toggle('active', c.dataset.v === v)); }
function getChip(g){ const a = document.querySelector(`#chips-${g} .fchip.active`); return a ? a.dataset.v : ''; }

// ── Omang input ────────────────────────────────────────────────────────────
function handleOmangInput(input){
  input.value = fmtOmang(input.value);
  const raw  = rawOmang(input.value);
  const hint = document.getElementById('omangHint');
  const g    = genderFromOmang(input.value);
  if (g) setChipVal('sex', g);
  if (raw.length < 9){ hint.textContent = `${raw.length}/9 digits`; hint.className = 'omang-hint'; document.getElementById('autofillBox').style.display = 'none'; return; }
  if (!validOmang(input.value)){ hint.textContent = 'Invalid Omang'; hint.className = 'omang-hint invalid'; return; }
  hint.textContent = '✓ Valid'; hint.className = 'omang-hint valid';
  clearTimeout(_omangTimer);
  _omangTimer = setTimeout(() => checkAutofill(raw), 700);
}

// ── Autofill ───────────────────────────────────────────────────────────────
async function checkAutofill(omang){
  const hint  = document.getElementById('omangHint');
  const errEl = document.getElementById('formErr');
  hint.textContent = 'Checking…'; hint.className = 'omang-hint checking';
  errEl.textContent = '';
  document.getElementById('autofillBox').style.display = 'none';

  const { data: existing } = await sb
    .from('waiting_list').select('id,first_name,surname')
    .eq('omang_number', omang).maybeSingle();
  if (existing){
    hint.textContent  = '⚠ Already in waiting list';
    hint.className    = 'omang-hint invalid';
    errEl.textContent = `${existing.first_name} ${existing.surname} is already on the waiting list.`;
    return;
  }

  const { data: archiveRows } = await sb
    .from('worker_archive').select('*')
    .eq('omang_number', omang).order('archived_at', { ascending: false }).limit(1);
  const fromArchive = archiveRows && archiveRows[0];

  const { data: projArchRows } = await sb
    .from('project_archive')
    .select('omang_number,first_name,surname,date_of_birth,sex,cellphone_number,mobile_money_provider,qualification,last_worked_date,archived_at')
    .eq('omang_number', omang).order('archived_at', { ascending: false }).limit(1);
  const fromProjArch = projArchRows && projArchRows[0];

  if (fromArchive || fromProjArch) {
    const base = fromArchive || fromProjArch;
    const lastWorked = (fromArchive && fromArchive.last_worked_date)
      || (fromProjArch && fromProjArch.last_worked_date) || null;
    _afCache = {
      omang_number: omang, surname: base.surname||'', first_name: base.first_name||'',
      date_of_birth: base.date_of_birth||'', village: base.village||'',
      cellphone_number: base.cellphone_number||'', mobile_money_provider: base.mobile_money_provider||'smega',
      sex: base.sex||'M', qualification: base.qualification||'PSLE',
      last_worked_date: lastWorked,
      total_days_worked: (fromArchive && fromArchive.total_days_worked)||0,
      total_employments: (fromArchive && fromArchive.total_employments)||0,
      _source: fromArchive ? 'worker_archive' : 'project_archive',
    };
    fillForm(_afCache);
    hint.textContent = _afCache._source === 'worker_archive'
      ? '↩ Found in worker archive — fields filled'
      : '↩ Found in project history — fields filled';
    hint.className = 'omang-hint valid';
    const lastW = lastWorked ? new Date(lastWorked).toLocaleDateString('en-ZA') : 'No record';
    document.getElementById('autofillText').innerHTML =
      `<b>${_afCache.first_name} ${_afCache.surname}</b> · Last worked: <b>${lastW}</b> · Employments: <b>${_afCache.total_employments}</b>`;
    document.getElementById('autofillBox').style.display = 'block';
    showToast(`${_afCache.first_name} ${_afCache.surname} — info loaded from archive ✓`, 'info');
  } else {
    _afCache = null;
    hint.textContent = '✓ New worker — fill in details below';
    hint.className   = 'omang-hint valid';
  }
}

function fillForm(w){
  document.getElementById('f-surname').value = w.surname       || '';
  document.getElementById('f-first').value   = w.first_name    || '';
  document.getElementById('f-dob').value     = w.date_of_birth || '';
  document.getElementById('f-village').value = w.village       || '';
  document.getElementById('f-phone').value   = w.cellphone_number || '';
  if (w.sex)                   setChipVal('sex',  w.sex);
  if (w.mobile_money_provider) setChipVal('mmp',  w.mobile_money_provider);
  if (w.qualification)         setChipVal('qual', w.qualification);
}

// ── Save (insert or update) ────────────────────────────────────────────────
async function saveWorker(){
  const surname = document.getElementById('f-surname').value.trim();
  const first   = document.getElementById('f-first').value.trim();
  const dob     = document.getElementById('f-dob').value.trim();
  const village = document.getElementById('f-village').value.trim();
  const phone   = document.getElementById('f-phone').value.trim();
  const errEl   = document.getElementById('formErr');
  errEl.textContent = '';

  if (!surname || !first) { errEl.textContent = 'First and last name are required.'; return; }
  if (!dob)               { errEl.textContent = 'Date of birth is required.'; return; }
  if (!village)           { errEl.textContent = 'Village is required.'; return; }

  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = 'Saving…';

  if (_editId) {
    const payload = {
      surname, first_name: first, date_of_birth: dob, village,
      cellphone_number: phone || null, sex: getChip('sex'),
      mobile_money_provider: getChip('mmp'), qualification: getChip('qual'),
      notes: document.getElementById('f-notes').value.trim() || null,
    };
    const { error } = await sb.from('waiting_list').update(payload).eq('id', _editId);
    btn.disabled = false; btn.textContent = 'Save Changes';
    if (error) { errEl.textContent = 'Error: ' + error.message; return; }
    const edited = _list.find(x => x.id === _editId);
    await logAudit('updated', edited?.omang_number || '—', `${first} ${surname}`, { fields_edited: Object.keys(payload) });
    closeModal();
    showToast(`${first} ${surname} updated ✓`, 'success');
  } else {
    const omang = rawOmang(document.getElementById('f-omang').value);
    if (!validOmang(omang)) { errEl.textContent = 'Omang number must be exactly 9 digits.'; btn.disabled = false; btn.textContent = 'Add to List'; return; }
    const af = _afCache || {};
    const { error } = await sb.from('waiting_list').insert({
      omang_number: omang, surname, first_name: first, date_of_birth: dob, village,
      cellphone_number: phone || null, sex: getChip('sex'),
      mobile_money_provider: getChip('mmp'), qualification: getChip('qual'),
      notes: document.getElementById('f-notes').value.trim() || null,
      is_returning_worker: !!_afCache, last_worked_date: af.last_worked_date||null,
      total_days_worked: af.total_days_worked||0, total_employments: af.total_employments||0,
      project_id: PROJECT_ID || null,
    });
    btn.disabled = false; btn.textContent = 'Add to List';
    if (error) { errEl.textContent = 'Error: ' + error.message; return; }
    await logAudit('added', omang, `${first} ${surname}`, { is_returning: !!_afCache, village });
    closeModal();
    showToast(`${first} ${surname} added ✓`, 'success');
  }

  await loadList();
}

// ── Toast ──────────────────────────────────────────────────────────────────
function showToast(msg, type = 'success'){
  const t = document.createElement('div');
  t.className = `toast ${type}`; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3200);
}

init();

</script>
